name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight
  workflow_dispatch:        # lets you run it manually too

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: prathambalehosurr
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

**Step 2 — Enable Actions permissions**

Go to your repo → **Settings** → **Actions** → **General** → set "Workflow permissions" to **Read and write permissions** → Save.

---

**Step 3 — Run it manually the first time**

Go to **Actions** tab → click **Generate Snake** → click **Run workflow**. It'll generate the SVGs and push them to an `output` branch.

---

**Step 4 — Your README already has the right image tag!** 🎉

The snake line in your README is already pointing to the correct URL:
```
https://raw.githubusercontent.com/prathambalehosurr/prathambalehosurr/output/github-contribution-grid-snake-dark.svg
